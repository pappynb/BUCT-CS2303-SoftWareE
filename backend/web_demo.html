<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>文物图片 API 联调页（Web 组）</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #f0f2f5; }
    h1 { font-size: 1.25rem; }
    .bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    input, button, select { padding: 8px 12px; font-size: 14px; }
    input { min-width: 280px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card img { width: 100%; height: 200px; object-fit: contain; background: #fafafa; display: block; }
    .card .info { padding: 10px; font-size: 13px; }
    .card .title { font-weight: 600; margin-bottom: 4px; line-height: 1.3; max-height: 2.6em; overflow: hidden; }
    .card .meta { color: #666; font-size: 12px; }
    .status { padding: 8px 12px; background: #e6f4ff; border-radius: 6px; margin-bottom: 12px; font-size: 14px; }
    .err { background: #fff2f0; color: #a8071a; }
  </style>
</head>
<body>
  <h1>海外藏中国文物 — 图片 API 联调</h1>
  <p>仅使用 <code>img_web</code> 本地图接口，不使用 <code>image_url</code>。</p>

  <div class="bar">
    <label>API 地址：</label>
    <input id="apiBase" value="http://127.0.0.1:8000" placeholder="http://服务器IP:8000"/>
    <select id="museumId">
      <option value="2">哈佛 (museum_id=2)</option>
      <option value="1">史密森尼 (1)</option>
      <option value="3">MFA (3)</option>
    </select>
    <button id="loadBtn">加载列表</button>
  </div>
  <div id="status" class="status">点击「加载列表」测试</div>
  <div id="grid" class="grid"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function load() {
      const base = $("apiBase").value.replace(/\/$/, "");
      const mid = $("museumId").value;
      $("status").className = "status";
      $("status").textContent = "加载中…";
      $("grid").innerHTML = "";

      try {
        const health = await fetch(base + "/api/health");
        if (!health.ok) throw new Error("health " + health.status);
        const h = await health.json();

        const res = await fetch(base + `/api/artifacts?museum_id=${mid}&size=12`);
        if (!res.ok) throw new Error("artifacts " + res.status);
        const data = await res.json();

        const withImg = data.list.filter((x) => x.img_web);
        $("status").textContent =
          `连接 OK | 共 ${data.total} 条 | 本页 ${data.list.length} 条 | 可出图 ${withImg.length} 条 | 图片根目录: ${(h.image_roots || []).join("; ")}`;

        if (!withImg.length) {
          $("status").className = "status err";
          $("status").textContent += " — 无本地图，请检查服务器 HARVARD_IMAGE_DIR";
          return;
        }

        $("grid").innerHTML = withImg.map((item) => {
          const src = base + item.img_web;
          return `
            <article class="card">
              <img src="${src}" alt="${item.title}" loading="lazy"
                   onerror="this.alt='加载失败'; this.style.background='#fee';"/>
              <div class="info">
                <div class="title">${item.title || item.object_id}</div>
                <div class="meta">${item.dynasty || ""} · ${item.material?.slice(0, 40) || ""}</div>
                <div class="meta">ID: ${item.object_id} · 多图: ${(item.imgs_web || []).length}</div>
              </div>
            </article>`;
        }).join("");
      } catch (e) {
        $("status").className = "status err";
        $("status").textContent = "失败: " + e.message + " — 请确认 backend 已启动且地址/防火墙正确";
      }
    }

    $("loadBtn").addEventListener("click", load);
  </script>
</body>
</html>
