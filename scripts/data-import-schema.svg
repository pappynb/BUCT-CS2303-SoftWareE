<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">文物知识图谱数据导入维度示意图</title>
  <desc id="desc">展示导入数据的节点维度、关系维度和补充信息三层结构，并用中心图谱枢纽连接。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5ef"/>
      <stop offset="100%" stop-color="#edf3f9"/>
    </linearGradient>
    <linearGradient id="centerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f5d62"/>
      <stop offset="100%" stop-color="#16373b"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#f3efe4"/>
    </linearGradient>
    <linearGradient id="relGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#e6f0fb"/>
    </linearGradient>
    <linearGradient id="infoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f3"/>
      <stop offset="100%" stop-color="#f6e7dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1c2d33" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2c3f46" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #16373b; letter-spacing: 1px; }
      .subtitle { font: 500 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5f6f77; }
      .sectionTitle { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17343a; }
      .label { font: 600 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #24474d; }
      .small { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #60727a; }
      .pill { font: 600 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #264449; }
      .centerText { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #f8fbfb; }
      .centerSub { font: 500 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #cfe2e4; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <circle cx="250" cy="120" r="110" fill="#dfeee9" opacity="0.75"/>
  <circle cx="1410" cy="140" r="150" fill="#dfe9f4" opacity="0.72"/>
  <circle cx="1450" cy="860" r="180" fill="#efe3d6" opacity="0.7"/>
  <circle cx="180" cy="860" r="160" fill="#e6f0fa" opacity="0.65"/>

  <text x="800" y="76" text-anchor="middle" class="title">文物知识图谱数据导入结构</text>
  <text x="800" y="112" text-anchor="middle" class="subtitle">节点维度、关系维度与补充信息统一映射到图谱中</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" rx="28" ry="28" width="380" height="520" fill="url(#nodeGrad)" stroke="#d8cdbb" stroke-width="2"/>
  </g>
  <text x="120" y="220" class="sectionTitle">节点维度</text>
  <text x="120" y="252" class="small">导入后可作为实体节点</text>

  <g>
    <rect x="120" y="290" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="195" y="324" text-anchor="middle" class="label">博物馆</text>

    <rect x="280" y="290" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="355" y="324" text-anchor="middle" class="label">朝代</text>

    <rect x="120" y="360" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="195" y="394" text-anchor="middle" class="label">艺术家</text>

    <rect x="280" y="360" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="355" y="394" text-anchor="middle" class="label">材质</text>

    <rect x="120" y="430" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="195" y="464" text-anchor="middle" class="label">类型</text>

    <rect x="280" y="430" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="355" y="464" text-anchor="middle" class="label">地点</text>

    <rect x="120" y="500" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="195" y="534" text-anchor="middle" class="label">文化</text>

    <rect x="280" y="500" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#cdbfa9" stroke-width="1.5"/>
    <text x="355" y="534" text-anchor="middle" class="label">文物</text>
  </g>

  <text x="120" y="612" class="small">建议按统一实体编码去重，避免同名重复入库</text>

  <g filter="url(#shadow)">
    <rect x="1140" y="170" rx="28" ry="28" width="380" height="520" fill="url(#relGrad)" stroke="#bfd0e6" stroke-width="2"/>
  </g>
  <text x="1180" y="220" class="sectionTitle">关系维度</text>
  <text x="1180" y="252" class="small">导入后连接节点，形成图结构</text>

  <g>
    <rect x="1180" y="290" rx="18" ry="18" width="160" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1260" y="324" text-anchor="middle" class="label">收藏</text>

    <rect x="1360" y="290" rx="18" ry="18" width="120" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1420" y="324" text-anchor="middle" class="label">归属</text>

    <rect x="1180" y="360" rx="18" ry="18" width="160" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1260" y="394" text-anchor="middle" class="label">创作</text>

    <rect x="1360" y="360" rx="18" ry="18" width="120" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1420" y="394" text-anchor="middle" class="label">材质</text>

    <rect x="1180" y="430" rx="18" ry="18" width="160" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1260" y="464" text-anchor="middle" class="label">类型</text>

    <rect x="1360" y="430" rx="18" ry="18" width="120" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1420" y="464" text-anchor="middle" class="label">地点</text>

    <rect x="1180" y="500" rx="18" ry="18" width="300" height="54" fill="#fff" stroke="#b8cae2" stroke-width="1.5"/>
    <text x="1330" y="534" text-anchor="middle" class="label">其他可扩展关系</text>
  </g>

  <text x="1180" y="612" class="small">关系建议使用方向、时间、权重等属性增强表达</text>

  <g filter="url(#shadow)">
    <rect x="370" y="740" rx="26" ry="26" width="860" height="170" fill="url(#infoGrad)" stroke="#e0c5b5" stroke-width="2"/>
  </g>
  <text x="410" y="792" class="sectionTitle">补充信息</text>
  <text x="410" y="825" class="small">用于增强实体识别、溯源校验和图片质量控制</text>

  <g>
    <rect x="410" y="850" rx="18" ry="18" width="170" height="54" fill="#fff" stroke="#e0c5b5" stroke-width="1.5"/>
    <text x="495" y="884" text-anchor="middle" class="pill">别名</text>

    <rect x="595" y="850" rx="18" ry="18" width="210" height="54" fill="#fff" stroke="#e0c5b5" stroke-width="1.5"/>
    <text x="700" y="884" text-anchor="middle" class="pill">来源记录</text>

    <rect x="820" y="850" rx="18" ry="18" width="200" height="54" fill="#fff" stroke="#e0c5b5" stroke-width="1.5"/>
    <text x="920" y="884" text-anchor="middle" class="pill">图片检查</text>

    <rect x="1035" y="850" rx="18" ry="18" width="150" height="54" fill="#fff" stroke="#e0c5b5" stroke-width="1.5"/>
    <text x="1110" y="884" text-anchor="middle" class="pill">备注</text>
  </g>

  <g filter="url(#soft)">
    <circle cx="800" cy="430" r="170" fill="url(#centerGlow)" stroke="#79aab0" stroke-width="3"/>
    <circle cx="800" cy="430" r="118" fill="none" stroke="#7fc2c7" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 10"/>
    <circle cx="800" cy="430" r="70" fill="#10282c" opacity="0.35"/>
  </g>

  <text x="800" y="402" text-anchor="middle" class="centerText">图谱枢纽</text>
  <text x="800" y="438" text-anchor="middle" class="centerSub">统一接入与关联</text>
  <text x="800" y="468" text-anchor="middle" class="centerSub">节点 · 关系 · 属性</text>

  <g stroke="#58767b" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 460 430 C 560 430, 610 430, 628 430"/>
    <path d="M 1140 430 C 1040 430, 990 430, 972 430"/>
    <path d="M 800 600 C 800 680, 800 704, 800 738"/>
  </g>

  <g fill="#58767b">
    <polygon points="628,422 628,438 650,430"/>
    <polygon points="972,422 972,438 950,430"/>
    <polygon points="792,738 808,738 800,720"/>
  </g>

  <g opacity="0.95">
    <rect x="690" y="160" rx="16" ry="16" width="220" height="56" fill="#16373b" opacity="0.08"/>
    <text x="800" y="195" text-anchor="middle" class="small">适合在导入页面、方案说明或数据字典中展示</text>
  </g>
</svg>
